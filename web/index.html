<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>随便记</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    background: #000;
    -webkit-font-smoothing: antialiased;
    display: flex; justify-content: center; align-items: center;
  }

  /* Phone shell — only on desktop */
  .app {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    background: linear-gradient(170deg, #f9f6f0 0%, #f0ece4 40%, #e8e4db 100%);
  }
  @media (min-width: 450px) {
    body { padding: 20px; }
    .app {
      max-width: 400px; max-height: 850px; height: 92vh;
      border-radius: 36px; overflow: hidden;
      box-shadow: 0 0 0 8px #1c1c1e, 0 0 0 10px #3a3a3c, 0 30px 80px rgba(0,0,0,0.6);
    }
  }

  /* ---- shared ---- */
  .glass  { background: rgba(255,255,255,0.55); border: 0.5px solid rgba(255,255,255,0.6); }
  .glass-strong { background: rgba(255,255,255,0.75); border: 0.5px solid rgba(255,255,255,0.85); }

  header {
    flex-shrink: 0; padding: 14px 20px 10px; text-align: center;
    background: rgba(255,255,255,0.5); border-bottom: 0.5px solid rgba(0,0,0,0.05);
  }
  header h1 { font-size: 17px; font-weight: 700; color: #1c1c1e; letter-spacing: -0.3px; }
  header time { font-size: 11px; color: rgba(0,0,0,0.4); display: block; margin-top: 2px; }

  /* ---- content area ---- */
  main {
    flex: 1; overflow: hidden; position: relative;
  }

  .page {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; overflow-y: auto;
    padding: 16px 16px 0; transition: opacity 0.25s;
  }
  .page::-webkit-scrollbar { display: none; }
  .page-hidden { opacity: 0; pointer-events: none; }

  /* ---- cards ---- */
  .card { border-radius: 20px; }

  /* Home page */
  .greeting { padding: 20px 18px 16px; margin-bottom: 16px; }
  .greeting-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .g-date { font-size: 12px; color: rgba(0,0,0,0.4); font-weight: 500; letter-spacing: 0.5px; }
  .g-title { font-size: 26px; font-weight: 800; color: #1c1c1e; margin: 4px 0 2px; letter-spacing: -0.5px; }
  .g-sub  { font-size: 13px; color: rgba(0,0,0,0.45); }
  .g-total { text-align: right; }
  .g-amount { font-size: 32px; font-weight: 800; color: #1c1c1e; line-height: 1; }
  .g-label { font-size: 11px; color: rgba(0,0,0,0.35); margin-top: 2px; }

  .ai-bubble {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 14px; border-radius: 14px; margin-bottom: 12px;
    font-size: 12px; color: rgba(0,0,0,0.5); background: rgba(255,255,255,0.35);
  }
  .ai-dot { width: 5px; height: 5px; border-radius: 50%; background: #FF6B35; animation: pulse 1.2s infinite; }
  .ai-dot:nth-child(2) { animation-delay: 0.2s; }
  .ai-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,60%,100%{opacity:0.2;transform:scale(0.8)} 30%{opacity:1;transform:scale(1)} }

  .divider { display: flex; align-items: center; gap: 10px; margin: 20px 0 10px; flex-shrink: 0; }
  .divider-line { flex: 1; height: 0.5px; background: rgba(0,0,0,0.06); }
  .divider-text { font-size: 11px; font-weight: 600; color: rgba(0,0,0,0.28); letter-spacing: 1px; }

  .bill {
    border-radius: 16px; padding: 14px 16px; margin-bottom: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .bill-left { display: flex; align-items: center; gap: 12px; }
  .bill-icon { width: 42px; height: 42px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .bill-name { font-size: 15px; font-weight: 600; color: #1c1c1e; }
  .bill-meta { font-size: 12px; color: rgba(0,0,0,0.33); margin-top: 1px; }
  .bill-amt { font-size: 16px; font-weight: 700; color: #1c1c1e; }

  /* Input */
  .input-wrap { flex-shrink: 0; padding: 8px 12px 20px; }
  .input-bar { border-radius: 22px; padding: 8px 10px 8px 16px; display: flex; align-items: center; gap: 8px; }
  .input-bar input { flex: 1; height: 32px; border: none; background: transparent; font-size: 14px; outline: none; color: #1c1c1e; font-family: inherit; }
  .input-bar input::placeholder { color: rgba(0,0,0,0.2); }
  .btn-go { width: 34px; height: 34px; border-radius: 50%; border: none; background: #1c1c1e; color: #fff; font-size: 16px; cursor: pointer; flex-shrink: 0; }
  .btn-go:active { transform: scale(0.9); }

  /* Stats page */
  .stat-card { padding: 28px 24px; text-align: center; margin-bottom: 16px; }
  .stat-label { font-size: 12px; color: rgba(0,0,0,0.4); font-weight: 600; letter-spacing: 1px; }
  .stat-big { font-size: 52px; font-weight: 800; color: #1c1c1e; margin: 8px 0; letter-spacing: -2px; }
  .stat-big small { font-size: 24px; font-weight: 400; color: rgba(0,0,0,0.4); }
  .stat-cmp { font-size: 13px; color: #10B981; font-weight: 600; margin-bottom: 4px; }

  .rank {
    border-radius: 18px; padding: 16px 18px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 14px;
  }
  .rank-num { font-size: 14px; font-weight: 700; color: rgba(0,0,0,0.18); width: 20px; flex-shrink: 0; }
  .rank-icon { width: 40px; height: 40px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .rank-info { flex: 1; min-width: 0; }
  .rank-name { font-size: 14px; font-weight: 600; color: #1c1c1e; }
  .rank-bar { height: 5px; background: rgba(0,0,0,0.05); border-radius: 3px; margin-top: 6px; }
  .rank-bar-fill { height: 100%; border-radius: 3px; }
  .rank-right { text-align: right; flex-shrink: 0; }
  .rank-val { font-size: 15px; font-weight: 700; color: #1c1c1e; }
  .rank-pct { font-size: 11px; color: rgba(0,0,0,0.33); }

  /* Tab bar */
  nav {
    flex-shrink: 0; display: flex; gap: 8px;
    padding: 8px 16px max(20px, env(safe-area-inset-bottom));
    border-top: 0.5px solid rgba(0,0,0,0.04);
  }
  .tab {
    flex: 1; padding: 10px; border-radius: 14px; text-align: center;
    font-size: 11px; font-weight: 600; color: rgba(0,0,0,0.3);
    cursor: pointer; border: 0.5px solid transparent;
  }
  .tab.on {
    background: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.8);
    color: #1c1c1e; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .tab span { font-size: 20px; display: block; margin-bottom: 2px; }

  /* Login */
  .login {
    position: fixed; inset: 0; z-index: 100;
    background: linear-gradient(170deg, #f9f6f0 0%, #f0ece4 40%, #e8e4db 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .login.hide { display: none; }
  .login-emoji { font-size: 64px; margin-bottom: 16px; }
  .login h2 { font-size: 24px; font-weight: 800; color: #1c1c1e; margin-bottom: 8px; }
  .login p { font-size: 14px; color: rgba(0,0,0,0.4); margin-bottom: 32px; }
  .login button {
    background: #1c1c1e; color: #fff; border: none; padding: 14px 48px;
    border-radius: 20px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;
  }

  .empty { text-align: center; padding: 48px 20px; color: rgba(0,0,0,0.2); font-size: 14px; }
  .spacer { height: 80px; }
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Login -->
  <div class="login" id="loginBox">
    <div class="login-emoji">💰</div>
    <h2>随便记</h2>
    <p>跟聊天一样记账，AI 帮你分类</p>
    <button onclick="doLogin()">开始使用</button>
  </div>

  <header>
    <h1 id="headerTitle">随便记</h1>
    <time id="headerTime"></time>
  </header>

  <main>
    <!-- Home -->
    <div class="page" id="pageHome">
      <div class="greeting card glass-strong">
        <div class="greeting-row">
          <div>
            <div class="g-date" id="gDate"></div>
            <div class="g-title">下午好</div>
            <div class="g-sub">今天花了多少？</div>
          </div>
          <div class="g-total" onclick="showPage('stats')">
            <div class="g-amount" id="todaySum">¥0.00</div>
            <div class="g-label">今日支出 · 0笔</div>
          </div>
        </div>
      </div>

      <div id="aiBubble" class="ai-bubble" style="display:none">
        <div style="display:flex;gap:3px"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div></div>
        AI 正在分类...
      </div>

      <div class="divider"><div class="divider-line"></div><span class="divider-text">今天</span><div class="divider-line"></div></div>
      <div id="todayList"></div>
      <div id="ydayDivider" class="divider" style="display:none"><div class="divider-line"></div><span class="divider-text">昨天</span><div class="divider-line"></div></div>
      <div id="ydayList"></div>
      <div class="spacer"></div>
    </div>

    <!-- Stats -->
    <div class="page page-hidden" id="pageStats">
      <div class="stat-card card glass-strong">
        <div class="stat-label" id="statLabel">2026 / July</div>
        <div class="stat-big">¥<span id="statInt">0</span><small id="statDec">.00</small></div>
        <div class="stat-cmp" id="statCmp" style="display:none"></div>
      </div>
      <div id="rankList"></div>
      <div class="spacer"></div>
    </div>
  </main>

  <div class="input-wrap" id="inputBar">
    <div class="input-bar glass-strong">
      <input id="billInput" placeholder="午饭吃了什么？花了多少？" onkeydown="if(event.key==='Enter')submitBill()">
      <button class="btn-go" onclick="submitBill()">↑</button>
    </div>
  </div>

  <nav>
    <div class="tab on" id="tabHome" onclick="showPage('home')"><span>💰</span>记账</div>
    <div class="tab" id="tabStats" onclick="showPage('stats')"><span>📊</span>统计</div>
  </nav>
</div>

<script>
const API = location.origin + '/api';
let token = localStorage.getItem('token');
const EMOJI = { '餐饮':'🍜','交通':'🚇','购物':'🛍','娱乐':'🎮','学习':'📚','日用':'🧴','收入':'💰','其他':'📌' };
const WD = ['日','一','二','三','四','五','六'];
const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function fm(n) { return String(n).padStart(2,'0'); }
function ds(d) { return `${d.getFullYear()}-${fm(d.getMonth()+1)}-${fm(d.getDate())}`; }

function tick() {
  const n = new Date();
  document.getElementById('gDate').textContent = `${n.getMonth()+1}月${n.getDate()}日 · 星期${WD[n.getDay()]}`;
  document.getElementById('headerTime').textContent = `${n.getMonth()+1}月${n.getDate()}日 星期${WD[n.getDay()]} · ${fm(n.getHours())}:${fm(n.getMinutes())}`;
  document.getElementById('statLabel').textContent = `${n.getFullYear()} / ${MO[n.getMonth()]}`;
}

async function call(method, path, body) {
  const h = { 'Content-Type':'application/json' };
  if (token) h['Authorization'] = 'Bearer '+token;
  const r = await fetch(API+path, { method, headers:h, body: body ? JSON.stringify(body) : undefined });
  if (r.status===401) { token=null; localStorage.removeItem('token'); document.getElementById('loginBox').classList.remove('hide'); throw new Error('登录过期'); }
  if (!r.ok) throw new Error(((await r.json().catch(()=>({}))).error) || '请求失败');
  return r.json();
}

async function doLogin() {
  const nick = '用户'+Math.random().toString(36).slice(2,6);
  const r = await call('POST','/auth/login',{ code:'web_'+Date.now(), nickname:nick });
  token = r.token; localStorage.setItem('token',token);
  document.getElementById('loginBox').classList.add('hide');
  refresh();
}

async function refresh() {
  try {
    const today = ds(new Date()), yday = ds(new Date(Date.now()-86400000));
    const bills = await call('GET','/bills?limit=200');
    let sum=0, cnt=0;
    const tb=[], yb=[];
    bills.forEach(b => {
      const it = { ...b, e:EMOJI[b.category]||'📌', t:b.created_at?b.created_at.slice(11,16):'' };
      if (b.recorded_at===today) { tb.push(it); if(b.type==='expense'){ sum+=b.amount; cnt++; } }
      else if (b.recorded_at===yday) { yb.push(it); }
    });
    document.getElementById('todaySum').textContent = '¥'+sum.toFixed(2);
    document.getElementById('gDate').nextElementSibling;
    document.getElementById('todayList').innerHTML = tb.length
      ? tb.map(b=>`<div class="bill glass"><div class="bill-left"><div class="bill-icon" style="background:rgba(255,107,53,0.08)">${b.e}</div><div><div class="bill-name">${b.note||b.category}</div><div class="bill-meta">${b.t} · ${b.category}</div></div></div><div class="bill-amt">${b.type==='income'?'+':'-'}${b.amount.toFixed(2)}</div></div>`).join('')
      : '<div class="empty">今天还没记账 ✍️</div>';
    const yd = document.getElementById('ydayDivider'), yl = document.getElementById('ydayList');
    if (yb.length) { yd.style.display='flex'; yl.innerHTML = yb.map(b=>`<div class="bill glass"><div class="bill-left"><div class="bill-icon" style="background:rgba(255,107,53,0.08)">${b.e}</div><div><div class="bill-name">${b.note||b.category}</div><div class="bill-meta">${b.t} · ${b.category}</div></div></div><div class="bill-amt">-${b.amount.toFixed(2)}</div></div>`).join(''); }
    else { yd.style.display='none'; yl.innerHTML=''; }
  } catch(e) { console.error(e); }
}

async function submitBill() {
  const el = document.getElementById('billInput'), txt = el.value.trim();
  if (!txt) return; el.value = '';
  const bub = document.getElementById('aiBubble'); bub.style.display = 'inline-flex';
  try { await call('POST','/bills',{ raw_text:txt }); bub.style.display='none'; refresh(); loadStats(); }
  catch(e) { bub.style.display='none'; alert(e.message); }
}

async function loadStats() {
  try {
    const n = new Date();
    const s = await call('GET',`/stats/monthly?year=${n.getFullYear()}&month=${n.getMonth()+1}`);
    const p = s.total.toFixed(2).split('.');
    document.getElementById('statInt').textContent = p[0];
    document.getElementById('statDec').textContent = '.'+p[1];
    const cmp = document.getElementById('statCmp');
    if (s.vs_last_month) {
      cmp.style.display='block';
      cmp.textContent = `↓ 比上月少花了 ¥${Math.abs(s.vs_last_month.amount).toFixed(0)} (${Math.abs(s.vs_last_month.percentage)}%)`;
    } else { cmp.style.display='none'; }
    const CL = { '餐饮':'#FF6B35','交通':'#10B981','购物':'#3B82F6','娱乐':'#8B5CF6','学习':'#F59E0B','日用':'#6B7280' };
    document.getElementById('rankList').innerHTML = s.breakdown.length
      ? s.breakdown.map((c,i)=>`<div class="rank glass"><span class="rank-num">${i+1}</span><div class="rank-icon" style="background:${(CL[c.category]||'#9CA3AF')}15">${EMOJI[c.category]||'📌'}</div><div class="rank-info"><div class="rank-name">${c.category}</div><div class="rank-bar"><div class="rank-bar-fill" style="width:${Math.max(c.percentage,4)}%;background:${CL[c.category]||'#9CA3AF'}"></div></div></div><div class="rank-right"><div class="rank-val">¥${c.amount.toFixed(0)}</div><div class="rank-pct">${c.percentage}%</div></div></div>`).join('')
      : '<div class="empty">暂无数据</div>';
  } catch(e) { console.error(e); }
}

function showPage(p) {
  document.getElementById('pageHome').classList.toggle('page-hidden', p!=='home');
  document.getElementById('pageStats').classList.toggle('page-hidden', p!=='stats');
  document.getElementById('headerTitle').textContent = p==='home'?'随便记':'账单分析';
  document.getElementById('tabHome').classList.toggle('on', p==='home');
  document.getElementById('tabStats').classList.toggle('on', p==='stats');
  document.getElementById('inputBar').style.display = p==='home'?'block':'none';
  if (p==='stats') loadStats();
}

tick(); setInterval(tick, 60000);
if (token) { document.getElementById('loginBox').classList.add('hide'); refresh(); loadStats(); }
</script>
</body>
</html>
